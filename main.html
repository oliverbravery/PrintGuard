<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PrintGuard POC</title>

    <script type="module">
        import { loadAndCompile, loadLiteRt, Tensor } from 'https://esm.sh/@litertjs/core@2.4.0';

        const LITERT_WASM = 'https://cdn.jsdelivr.net/npm/@litertjs/core@2.4.0/wasm/';
        window.__litert_ready = loadLiteRt(LITERT_WASM, { threads: false, jspi: false })
            .then(() => {
                window.__litert = { Tensor, loadAndCompile };
                console.log('LiteRT.js ready');
            })
            .catch((e) => { console.error('LiteRT load failed', e); throw e; });
    </script>

    <script>
        window.__frameGrabber = async function () {
            const video = document.getElementById('camera');
            if (!video.videoWidth) throw new Error('camera not ready');
            const canvas = document.getElementById('grab-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            return new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
        };

        window.__frameGrabberImageData = async function () {
            const video = document.getElementById('camera');
            if (!video.videoWidth) throw new Error('camera not ready');
            const canvas = document.getElementById('grab-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(video, 0, 0);
            return ctx.getImageData(0, 0, canvas.width, canvas.height);
        };
    </script>

    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
</head>
<body>
    <h1>PrintGuard POC</h1>
    <p>
        Mode:
        <select id="mode">
            <option value="local">local (LiteRT.js in browser)</option>
            <option value="hub">hub (FastAPI + ai-edge-litert)</option>
        </select>
    </p>
    <video id="camera" autoplay playsinline muted style="max-width: 480px; background: #000;"></video>
    <canvas id="grab-canvas" style="display:none;"></canvas>
    <div>
        <button id="start-btn">Start camera</button>
        <button id="detect-btn">Detect</button>
    </div>
    <pre id="result">awaiting PyScript…</pre>

    <script type="py" src="/app.py" config="/pyscript.toml"></script>
</body>
</html>
